<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OnePlus Style Calculator</title>
  <style>
    :root {
      --bg: #0d0d0f;
      --panel: #17181c;
      --display: #111216;
      --text: #ffffff;
      --muted: #9fa4ad;
      --digit: #2a2d34;
      --digit-press: #3a3e47;
      --operator: #ff6a00;
      --operator-press: #ff7f26;
      --action: #49505e;
    }

    * {
      box-sizing: border-box;
      font-family: "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top, #1a1b20 0%, var(--bg) 45%);
      color: var(--text);
      padding: 20px;
    }

    .calculator {
      width: min(92vw, 360px);
      background: var(--panel);
      border-radius: 28px;
      padding: 24px 26px 30px;
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.06);
    }

    .display {
      min-height: 120px;
      border-radius: 20px;
      background: var(--display);
      margin-bottom: 18px;
      padding: 18px;
      display: flex;
      align-items: end;
      justify-content: end;
      font-size: clamp(2rem, 4.8vw, 2.8rem);
      font-weight: 600;
      letter-spacing: 0.5px;
      overflow: hidden;
      word-break: break-all;
      text-align: right;
    }

    .display.empty {
      color: var(--muted);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      padding: 2px 2px 6px;
    }

    button {
      border: 0;
      border-radius: 999px;
      aspect-ratio: 1 / 1;
      padding: 10px;
      font-size: 1.45rem;
      font-weight: 600;
      color: var(--text);
      background: var(--digit);
      cursor: pointer;
      transition: transform 0.06s ease, background 0.15s ease;
    }

    button:active {
      transform: scale(0.96);
      background: var(--digit-press);
    }

    .operator {
      background: var(--operator);
    }

    .operator:active {
      background: var(--operator-press);
    }

    .action {
      background: var(--action);
      font-size: 1.05rem;
    }

    .zero {
      grid-column: span 2;
      aspect-ratio: 2 / 1;
      border-radius: 999px;
      text-align: left;
      padding-left: 30px;
    }
  </style>
</head>
<body>
  <main class="calculator" aria-label="calculator">
    <div id="display" class="display empty">0</div>

    <div class="grid">
      <button class="action" data-value="AC">AC</button>
      <button class="action" data-value="(">(</button>
      <button class="action" data-value=")">)</button>
      <button class="operator" data-value="/">÷</button>

      <button data-value="7">7</button>
      <button data-value="8">8</button>
      <button data-value="9">9</button>
      <button class="operator" data-value="*">×</button>

      <button data-value="4">4</button>
      <button data-value="5">5</button>
      <button data-value="6">6</button>
      <button class="operator" data-value="-">−</button>

      <button data-value="1">1</button>
      <button data-value="2">2</button>
      <button data-value="3">3</button>
      <button class="operator" data-value="+">+</button>

      <button class="zero" data-value="0">0</button>
      <button data-value=".">.</button>
      <button class="operator" data-value="=">=</button>
    </div>
  </main>

  <script>
    const display = document.querySelector('#display');
    const buttons = document.querySelectorAll('button');

    let calculation = localStorage.getItem('calculation') || '';
    updateDisplay();

    buttons.forEach((button) => {
      button.addEventListener('click', () => {
        const value = button.dataset.value;

        if (value === 'AC') {
          calculation = '';
          persist();
          updateDisplay();
          return;
        }

        if (value === '=') {
          try {
            calculation = String(eval(calculation || '0'));
            persist();
          } catch (error) {
            calculation = '';
            display.textContent = 'Error';
            display.classList.remove('empty');
            setTimeout(updateDisplay, 900);
            return;
          }
          updateDisplay();
          return;
        }

        calculation += value;
        persist();
        updateDisplay();
      });
    });

    function persist() {
      localStorage.setItem('calculation', calculation);
    }

    function updateDisplay() {
      if (!calculation) {
        display.textContent = '0';
        display.classList.add('empty');
        return;
      }

      display.textContent = calculation;
      display.classList.remove('empty');
    }
  </script>
</body>
</html>
